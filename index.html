        // 初始化
        async function init() {
            try {
                // Rule 3: Auth FIRST and await it
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }

                // Only start operations after successful auth
                listenToLogs();
                syncTwitch();
                setInterval(syncTwitch, 60000);
                updateClock();
                setInterval(updateClock, 1000);
                renderAllies();
                lucide.createIcons();
            } catch (err) {
                console.error("Firebase 初始化/認證失敗:", err);
            }
        }

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });
            const clockEl = document.getElementById('currentTime');
            const manualClockEl = document.getElementById('manualClock');
            if(clockEl) clockEl.textContent = timeStr;
            if(manualClockEl) manualClockEl.textContent = timeStr;
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-TW', { month: 'long', year: 'numeric' });
        }

        function listenToLogs() {
            if (!auth.currentUser) return; // Guard: Auth before query
            
            // Rule 1: Strict Paths
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'raid_logs');
            
            // Success and Error callbacks required
            onSnapshot(q, (snapshot) => {
                raidLogs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                renderLogs();
                updateStats();
            }, (err) => {
                console.error("日誌讀取權限錯誤:", err);
            });
        }

        async function syncTwitch() {
            try {
                const tokenRes = await fetch(`https://id.twitch.tv/oauth2/token?client_id=${TWITCH_CLIENT_ID}&client_secret=${TWITCH_CLIENT_SECRET}&grant_type=client_credentials`, { method: 'POST' });
                const { access_token } = await tokenRes.json();

                const streamRes = await fetch(`https://api.twitch.tv/helix/streams?user_login=${MONITOR_TARGET}`, {
                    headers: { 'Client-ID': TWITCH_CLIENT_ID, 'Authorization': `Bearer ${access_token}` }
                });
                const streamData = await streamRes.json();
                const userRes = await fetch(`https://api.twitch.tv/helix/users?login=${MONITOR_TARGET}`, {
                    headers: { 'Client-ID': TWITCH_CLIENT_ID, 'Authorization': `Bearer ${access_token}` }
                });
                const userData = await userRes.json();

                const isLive = streamData.data && streamData.data.length > 0;
                const avatar = userData.data && userData.data[0] ? userData.data[0].profile_image_url : "https://ui-avatars.com/api/?name=Y";

                document.getElementById('targetAvatar').src = avatar;
                document.getElementById('targetAvatar').classList.toggle('grayscale', !isLive);
                document.getElementById('targetAvatar').classList.toggle('border-red-500', isLive);
                document.getElementById('liveBadge').classList.toggle('hidden', !isLive);
                
                const card = document.getElementById('channelCard');
                if(isLive) {
                    card.style.background = 'linear-gradient(to bottom right, rgba(239, 68, 68, 0.1), rgba(153, 27, 27, 0.05))';
                    card.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                    document.getElementById('viewerDisplay').classList.replace('hidden', 'flex');
                    document.getElementById('currentViewer').textContent = streamData.data[0].viewer_count.toLocaleString();
                    document.getElementById('streamInfo').innerHTML = `<p class="text-xl font-bold italic text-white opacity-90">「 ${streamData.data[0].title} 」</p>`;
                } else {
                    card.style.background = '#18181b';
                    card.style.borderColor = 'rgba(255, 255, 255, 0.05)';
                    document.getElementById('viewerDisplay').classList.replace('flex', 'hidden');
                    document.getElementById('streamInfo').innerHTML = `<p class="text-lg font-bold text-gray-500 italic mt-1 flex items-center gap-3"><i data-lucide="moon" class="w-5 h-5"></i> 頻道目前休息中...</p>`;
                    lucide.createIcons();
                }
            } catch (e) { console.error("Twitch 同步失敗:", e); }
        }

        window.toggleMonitor = function() {
            isAutoMonitoring = !isAutoMonitoring;
            const btn = document.getElementById('monitorBtn');
            const status = document.getElementById('monitorStatus');
            const dot = document.getElementById('monitorDot');
            const floating = document.getElementById('floatingStatus');
            const statusDot = document.getElementById('statusDot');

            if(isAutoMonitoring) {
                btn.textContent = '停止自動監控';
                btn.classList.replace('bg-[#9146ff]', 'bg-red-600');
                status.textContent = '連線監測中...';
                dot.classList.replace('bg-gray-600', 'bg-green-500');
                dot.classList.add('animate-pulse');
                floating.textContent = '雷達狀態: 正在盯梢中';
                statusDot.classList.replace('bg-gray-600', 'bg-green-500');
                statusDot.classList.add('animate-pulse');

                tmiClient = new tmi.Client({ channels: [MONITOR_TARGET] });
                tmiClient.connect();
                tmiClient.on('usernotice', (chan, msgid, stack, tags) => {
                    if(msgid === 'raid') {
                        const target = tags['msg-param-displayName'] || tags['msg-param-login'];
                        const count = parseInt(tags['msg-param-viewerCount']) || 0;
                        handleLog(target, count, 'SYSTEM_RADAR');
                    }
                });
            } else {
                btn.textContent = '啟動自動監控';
                btn.classList.replace('bg-red-600', 'bg-[#9146ff]');
                status.textContent = '系統就緒';
                dot.classList.replace('bg-green-500', 'bg-gray-600');
                dot.classList.remove('animate-pulse');
                floating.textContent = '雷達狀態: 休眠中';
                statusDot.classList.replace('bg-green-500', 'bg-gray-600');
                statusDot.classList.remove('animate-pulse');
                if(tmiClient) tmiClient.disconnect();
            }
        };

        async function handleLog(target, count, type) {
            if (!auth.currentUser) return;
            const cleanId = target.toLowerCase().trim();
            const ally = INITIAL_ALLIES.find(a => a.id.toLowerCase() === cleanId);
            try {
                // Rule 1: Strict Paths
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'raid_logs'), {
                    targetId: cleanId,
                    targetName: ally ? ally.name : '未知 (非盟友)',
                    viewerCount: parseInt(count) || 0,
                    tier: ally ? ally.type : 'N/A',
                    isAlly: !!ally,
                    timestamp: serverTimestamp(),
                    createdBy: type,
                    followerGrowth: null
                });
            } catch (e) { console.error("日誌寫入失敗:", e); }
        }

        window.submitManual = async function() {
            const id = document.getElementById('manualId').value;
            const count = document.getElementById('manualCount').value;
            if(!id || !count) return;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '寫入中...';
            await handleLog(id, count, 'MANUAL');
            document.getElementById('manualId').value = '';
            document.getElementById('manualCount').value = '';
            btn.disabled = false;
            btn.textContent = '確認補登資料';
            switchTab('history');
        };

        window.deleteLog = async function(id) {
            if(!auth.currentUser) return;
            if(confirm("確定要刪除這筆紀錄嗎？")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'raid_logs', id));
            }
        };

        function renderLogs() {
            const container = document.getElementById('raidLogContainer');
            if(raidLogs.length === 0) {
                container.innerHTML = `<div class="text-center py-32 glass rounded-[3.5rem] italic text-gray-500 uppercase font-black">目前尚無紀錄</div>`;
                return;
            }

            container.innerHTML = raidLogs.map((log, i) => {
                const logDate = new Date(log.timestamp?.seconds * 1000);
                
                const monthlyLogs = raidLogs.filter(l => {
                    const d = new Date(l.timestamp?.seconds * 1000);
                    return d.getMonth() === logDate.getMonth() && d.getFullYear() === logDate.getFullYear();
                }).reverse();
                const mIndex = monthlyLogs.findIndex(l => l.id === log.id) + 1;

                const tierClass = log.tier === 'T1' ? 'raid-row-t1 text-yellow-400' : log.tier === 'T2' ? 'raid-row-t2 text-cyan-400' : 'raid-row-t3 text-gray-400';
                const badgeClass = log.tier === 'T1' ? 'bg-yellow-400 text-black' : log.tier === 'T2' ? 'bg-cyan-400 text-black' : 'bg-gray-500 text-white';

                return `
                    <div class="grid grid-cols-1 md:grid-cols-12 items-center gap-4 ${tierClass} p-6 rounded-[2.5rem] group transition-all hover:scale-[1.015]">
                        <div class="md:col-span-1 flex flex-col items-center">
                           <span class="text-[8px] text-gray-600 font-black uppercase">本月第</span>
                           <div class="bg-white/10 w-10 h-10 rounded-full flex items-center justify-center font-black text-lg">${mIndex || '?'}</div>
                        </div>
                        <div class="md:col-span-1 flex justify-center">
                            <div class="w-11 h-11 rounded-2xl flex items-center justify-center font-black text-xs ${badgeClass}">${log.tier}</div>
                        </div>
                        <div class="md:col-span-3 flex items-center gap-5 md:ml-4">
                            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(log.targetName)}&background=242424&color=fff" class="w-14 h-14 rounded-full border-2 border-white/10">
                            <div>
                                <p class="font-black text-xl text-white">${log.targetName}</p>
                                <p class="text-xs text-[#9146ff] font-black opacity-70 tracking-tight">@${log.targetId}</p>
                            </div>
                        </div>
                        <div class="md:col-span-2 text-center">
                            <div class="inline-flex items-center gap-1.5 bg-black/40 px-6 py-3 rounded-[2rem] border border-white/5">
                               <span class="text-4xl font-black text-white italic tracking-tighter">${log.viewerCount}</span>
                               <span class="text-[10px] text-gray-600 font-black">人</span>
                            </div>
                        </div>
                        <div class="md:col-span-2 text-center">
                            ${log.followerGrowth !== null ? `
                                <div class="inline-flex items-center gap-1.5 bg-green-500/10 px-6 py-2.5 rounded-[2rem] text-green-500">
                                   <span class="text-4xl font-black italic tracking-tighter">+${log.followerGrowth}</span>
                                </div>
                            ` : `
                                <div class="inline-flex items-center gap-2 text-gray-600 text-xs font-black italic">
                                   <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 監測中...
                                </div>
                            `}
                        </div>
                        <div class="md:col-span-2 text-right text-xs font-black">
                            <p class="text-gray-400">${logDate.toLocaleDateString()}</p>
                            <p class="text-white">${logDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                        </div>
                        <div class="md:col-span-1 text-right">
                            <button onclick="deleteLog('${log.id}')" class="p-3 opacity-0 group-hover:opacity-100 text-gray-700 hover:text-red-500 transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function updateStats() {
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            const totalV = raidLogs.reduce((acc, curr) => acc + (curr.viewerCount || 0), 0);
            const monthlyLogs = raidLogs.filter(l => {
                const d = new Date(l.timestamp?.seconds * 1000);
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });
            const monthV = monthlyLogs.reduce((acc, curr) => acc + (curr.viewerCount || 0), 0);
            
            document.getElementById('stat-totalV').textContent = totalV.toLocaleString();
            document.getElementById('stat-monthV').textContent = monthV.toLocaleString();
            document.getElementById('stat-t1').textContent = raidLogs.filter(l => l.tier === 'T1').length;
            document.getElementById('stat-t2').textContent = raidLogs.filter(l => l.tier === 'T2').length;
            document.getElementById('stat-t3').textContent = raidLogs.filter(l => l.tier === 'T3').length;
            document.getElementById('stat-totalRaids').textContent = raidLogs.length;
        }

        function renderAllies() {
            const container = document.getElementById('alliesContainer');
            if(!container) return;
            container.innerHTML = INITIAL_ALLIES.map(a => `
                <div class="ally-card glass p-7 rounded-[3rem] flex flex-col gap-6 transition-all hover:scale-[1.03]" data-name="${a.name}" data-id="${a.id}">
                    <div class="flex items-center gap-5">
                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(a.name)}&background=242424&color=fff" class="w-16 h-16 rounded-full border-2 border-white/10">
                        <div>
                            <div class="flex items-center gap-2">
                                <p class="font-black text-xl text-white">${a.name}</p>
                                <span class="text-[9px] font-black px-2 py-1 rounded-lg border border-white/10 uppercase">${a.type}</span>
                            </div>
                            <p class="text-sm text-[#9146ff] font-black opacity-80 tracking-tight">@${a.id}</p>
                        </div>
                    </div>
                    <div class="bg-black/40 p-5 rounded-3xl min-h-[70px] flex items-center border border-white/5 text-center">
                        <p class="text-xs text-gray-400 font-bold italic leading-relaxed w-full">${a.intro || '-'}</p>
                    </div>
                </div>
            `).join('');
        }

        window.filterAllies = function() {
            const q = document.getElementById('allySearch').value.toLowerCase();
            document.querySelectorAll('.ally-card').forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                const id = card.getAttribute('data-id').toLowerCase();
                card.style.display = (name.includes(q) || id.includes(q)) ? 'flex' : 'none';
            });
        };

        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            const targetView = document.getElementById(`${tabId}View`);
            if(targetView) targetView.classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-[#9146ff]', 'text-white');
                b.classList.add('text-gray-400');
            });
            const targetTab = document.getElementById(`tab-${tabId}`);
            if(targetTab) {
                targetTab.classList.add('bg-[#9146ff]', 'text-white');
                targetTab.classList.remove('text-gray-400');
            }
        };

        init();
    </script>
</body>
</html>
