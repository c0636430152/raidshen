<!DOCTYPE html>
<html lang="zh-TW" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>祐玄 yushenofficial | 揪團自動監控系統 v6.0</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        twitch: { DEFAULT: '#9146FF', accent: '#00e5ff', dark: '#0e0e10', card: '#18181b' }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/tmi.min.js"></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background: #0e0e10; color: #efeff1; }
        .glass-panel { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* 盟友分級樣式 */
        .card-t1 { background: rgba(250, 204, 21, 0.08) !important; border-left: 4px solid #F59E0B !important; }
        .card-t2 { background: rgba(34, 211, 238, 0.08) !important; border-left: 4px solid #3B82F6 !important; }
        .card-t3 { background: rgba(156, 163, 175, 0.08) !important; border-left: 4px solid #6B7280 !important; }
        .card-none { background: rgba(255, 255, 255, 0.03) !important; border-left: 4px solid transparent !important; }

        .badge-t1 { background: #FACC15; color: #451A03; }
        .badge-t2 { background: #22D3EE; color: #fff; }
        .badge-t3 { background: #4B5563; color: #fff; }
        .badge-none { background: rgba(255, 255, 255, 0.1); color: #9CA3AF; }

        .live-ring::after {
            content: ''; position: absolute; inset: -5px; border-radius: 50%;
            border: 2px solid #ef4444; animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3a3a3d; border-radius: 10px; }
    </style>
</head>

<body class="pb-20">
    <!-- Top Minimalist Clock Bar -->
    <div class="w-full bg-black/60 border-b border-white/5 py-1.5 px-8 text-center">
        <span id="top-clock" class="text-[10px] font-black tracking-[0.3em] text-gray-500 uppercase">2026.04.26 SUNDAY 00:00:00</span>
    </div>

    <header class="sticky top-0 z-50 bg-[#0e0e10]/80 backdrop-blur-xl border-b border-white/5 px-8 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-twitch rounded-xl flex items-center justify-center shadow-lg shadow-twitch/20">
                    <i data-lucide="radar" class="w-6 h-6 text-white"></i>
                </div>
                <h1 class="text-2xl font-black italic tracking-tighter">祐玄揪團監控中心</h1>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right border-r border-white/10 pr-6 mr-6 hidden sm:block">
                    <div id="side-date" class="text-[10px] font-black text-gray-500 uppercase tracking-widest">2026.04.26</div>
                    <div id="side-time" class="text-2xl font-black text-twitch-accent tracking-tighter">00:00:00</div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Auto Tracking Active</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto mt-10 px-8">
        <!-- Live Status Card -->
        <div class="glass-panel rounded-[2.5rem] p-8 md:p-10 mb-10 flex flex-col md:flex-row items-center gap-10 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-80 h-80 bg-twitch/10 blur-[100px] rounded-full -z-10"></div>
            
            <div class="relative flex-shrink-0">
                <div id="target-avatar-container" class="w-36 h-36 md:w-48 md:h-48 rounded-full border-4 border-white/10 p-1 transition-all duration-500">
                    <img id="target-img" src="https://ui-avatars.com/api/?name=Y&background=18181b&color=9146FF" class="w-full h-full rounded-full object-cover">
                </div>
                <div id="live-badge" class="absolute -bottom-2 left-1/2 -translate-x-1/2 px-6 py-1.5 rounded-full text-xs font-black uppercase tracking-[0.2em] bg-gray-700 border-2 border-[#0e0e10]">OFFLINE</div>
            </div>

            <div class="flex-1 text-center md:text-left">
                <div class="flex items-center justify-center md:justify-start gap-4 mb-3">
                    <h2 class="text-4xl md:text-5xl font-black italic tracking-tighter">yushenofficial</h2>
                    <a href="https://twitch.tv/yushenofficial" target="_blank" class="text-twitch hover:text-twitch-accent transition-colors"><i data-lucide="external-link" class="w-7 h-7"></i></a>
                </div>
                <p id="stream-title" class="text-gray-400 font-bold italic text-lg md:text-xl line-clamp-2 mb-8 leading-relaxed">同步實況標題中...</p>
                
                <div class="flex flex-wrap justify-center md:justify-start gap-5">
                    <div class="bg-black/40 px-6 py-3 rounded-2xl border border-white/5 flex items-center gap-4">
                        <i data-lucide="users" class="w-6 h-6 text-twitch-accent"></i>
                        <span id="v-count" class="text-2xl font-black tracking-tight">0</span>
                        <span class="text-[10px] font-black text-gray-600 uppercase tracking-widest">Live</span>
                    </div>
                    <div class="bg-black/40 px-6 py-3 rounded-2xl border border-white/5 flex items-center gap-4">
                        <i data-lucide="zap" class="w-6 h-6 text-red-500"></i>
                        <span id="r-total" class="text-2xl font-black tracking-tight">0</span>
                        <span class="text-[10px] font-black text-gray-600 uppercase tracking-widest">Total Raids</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- History List -->
        <div class="glass-panel rounded-[3rem] overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-white/5 bg-white/[0.02] flex justify-between items-center">
                <h3 class="text-2xl font-black italic uppercase tracking-tighter flex items-center gap-4">
                    <i data-lucide="history" class="w-7 h-7 text-twitch-accent"></i> 歷史自動抓取紀錄
                </h3>
                <button onclick="clearLogs()" class="p-2.5 bg-red-500/10 hover:bg-red-500/20 rounded-xl text-red-500 transition-colors">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            </div>
            <div id="log-list" class="p-6 md:p-8 space-y-4 max-h-[800px] overflow-y-auto custom-scrollbar">
                <!-- Data will be injected here -->
                <div class="py-32 text-center opacity-20 italic">
                    <i data-lucide="search" class="w-16 h-16 mx-auto mb-4"></i>
                    正在監聽祐玄的揪團動作...
                </div>
            </div>
        </div>
    </main>

    <script>
        const API = { client: '3llrahqqu4s0gi17eehtoft8g60may', secret: 'dyvy4obvo5p8yu0p01h8cvayjji4yf', token: null };
        const TARGET = 'yushenofficial';

        // 盟友名單 (內含 76 位盟友 ID)
        const ALLIES = [
            { id: "meitoo85", type: "T1" }, { id: "a12360107", type: "T1" }, { id: "xivxy", type: "T1" }, { id: "xmaoqiux", type: "T1" }, 
            { id: "maomao77777", type: "T1" }, { id: "bandso2000", type: "T1" }, { id: "chiiling04", type: "T1" }, { id: "gjesst4628", type: "T1" },
            { id: "mori1028", type: "T1" }, { id: "lcl_wiz29", type: "T1" }, { id: "4_egg", type: "T1" }, { id: "xiaoyu24323", type: "T1" },
            { id: "orangemao", type: "T1" }, { id: "ggsod", type: "T1" }, { id: "shishichuchu", type: "T1" }, { id: "a0411utumn", type: "T1" },
            { id: "johnny2562440", type: "T1" }, { id: "kouyifu", type: "T1" }, { id: "catchbunny", type: "T1" }, { id: "betty_bouod", type: "T1" },
            { id: "000lin11", type: "T1" }, { id: "tin_202", type: "T1" }, { id: "yating1222", type: "T1" }, { id: "sukaomao", type: "T1" },
            { id: "bonnyyy_", type: "T1" }, { id: "snowcow5200", type: "T1" }, { id: "yukai0915", type: "T1" }, { id: "ting5211", type: "T1" },
            { id: "hua1031_", type: "T1" }, { id: "cheesepotato99", type: "T1" }, { id: "susi1128", type: "T1" }, { id: "memejaiovo", type: "T1" },
            { id: "j8899", type: "T1" }, { id: "shih_n", type: "T1" }, { id: "lingling0045", type: "T1" }, { id: "wsx70529", type: "T1" },
            { id: "hamiguaa", type: "T1" }, { id: "dada6621", type: "T1" },
            { id: "a1000281", type: "T2" }, { id: "ranran1019", type: "T2" }, { id: "aumimimi", type: "T2" }, { id: "liang_dong_3c", type: "T2" },
            { id: "yuzz727", type: "T2" }, { id: "lala_8282", type: "T2" }, { id: "minxiongtw", type: "T2" }, { id: "xuj1n9e", type: "T2" },
            { id: "gua910625", type: "T2" }, { id: "kazgabong", type: "T2" }, { id: "kerwinnn_", type: "T2" }, { id: "linheng0310", type: "T2" },
            { id: "lynnnnn_819", type: "T2" }, { id: "maple04033", type: "T2" }, { id: "muacheeee", type: "T2" }, { id: "hanidonatsu", type: "T2" },
            { id: "lingmu_ch", type: "T2" }, { id: "orz699", type: "T2" }, { id: "chiuruby", type: "T2" }, { id: "st101715", type: "T2" },
            { id: "only26k", type: "T2" }, { id: "lemonyang", type: "T2" }, { id: "lock1ngtnt", type: "T2" }, { id: "znnnxll_", type: "T2" },
            { id: "neun09", type: "T2" }, { id: "yyyc_o1o1", type: "T2" }, { id: "wsnewoff5", type: "T2" }, { id: "yinwei_exe", type: "T2" },
            { id: "tychelin", type: "T3" }, { id: "qiannnzl", type: "T3" }, { id: "aas0220", type: "T3" }, { id: "omimimimi123", type: "T3" },
            { id: "amidodo_", type: "T3" }, { id: "xmoooomx", type: "T3" }, { id: "yuukaha", type: "T3" }, { id: "jamie_oovoo", type: "T3" },
            { id: "sawaa0816", type: "T3" }, { id: "hahahe0304", type: "T3" }
        ];

        // --- Basic UI ---
        function updateClock() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '.');
            const dayStr = now.toLocaleDateString('en-US', { weekday: 'long' });
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });
            
            document.getElementById('top-clock').innerText = `${dateStr} ${dayStr} ${timeStr}`;
            document.getElementById('side-date').innerText = dateStr;
            document.getElementById('side-time').innerText = timeStr;
        }
        setInterval(updateClock, 1000); updateClock();

        // --- Twitch API Logic ---
        async function getToken() {
            try {
                const res = await fetch(`https://id.twitch.tv/oauth2/token?client_id=${API.client}&client_secret=${API.secret}&grant_type=client_credentials`, { method: 'POST' });
                const d = await res.json(); API.token = d.access_token; return d.access_token;
            } catch (e) { return null; }
        }

        async function syncLiveStatus() {
            if (!API.token) await getToken();
            if (!API.token) return;
            try {
                const [uRes, sRes] = await Promise.all([
                    fetch(`https://api.twitch.tv/helix/users?login=${TARGET}`, { headers: { 'Client-ID': API.client, 'Authorization': `Bearer ${API.token}` } }),
                    fetch(`https://api.twitch.tv/helix/streams?user_login=${TARGET}`, { headers: { 'Client-ID': API.client, 'Authorization': `Bearer ${API.token}` } })
                ]);
                const u = await uRes.json(); const s = await sRes.json();
                
                if (u.data?.[0]) document.getElementById('target-img').src = u.data[0].profile_image_url;
                
                const badge = document.getElementById('live-badge');
                const title = document.getElementById('stream-title');
                const vcount = document.getElementById('v-count');
                const avatarCont = document.getElementById('target-avatar-container');

                if (s.data?.[0]) {
                    badge.innerText = 'LIVE NOW';
                    badge.className = 'absolute -bottom-2 left-1/2 -translate-x-1/2 px-6 py-1.5 rounded-full text-xs font-black uppercase tracking-[0.2em] bg-red-600 border-2 border-[#0e0e10] shadow-[0_0_20px_rgba(239,68,68,0.5)]';
                    title.innerText = s.data[0].title;
                    title.className = 'text-twitch-accent font-black italic text-lg md:text-xl line-clamp-2 mb-8 leading-relaxed';
                    vcount.innerText = s.data[0].viewer_count.toLocaleString();
                    avatarCont.classList.add('live-ring');
                } else {
                    badge.innerText = 'OFFLINE';
                    badge.className = 'absolute -bottom-2 left-1/2 -translate-x-1/2 px-6 py-1.5 rounded-full text-xs font-black uppercase tracking-[0.2em] bg-gray-700 border-2 border-[#0e0e10] shadow-xl';
                    title.innerText = '祐玄目前尚未開台';
                    title.className = 'text-gray-500 font-bold italic text-lg md:text-xl line-clamp-2 mb-8 leading-relaxed';
                    vcount.innerText = '0';
                    avatarCont.classList.remove('live-ring');
                }
            } catch (err) { }
        }

        // --- Tracking ---
        const irc = new tmi.Client({ channels: [TARGET] });
        irc.on('usernotice', async (chan, user, msg, self) => {
            if (user['msg-id'] === 'raid') {
                const tid = user['msg-param-login'].toLowerCase();
                const tname = user['msg-param-displayName'] || tid;
                const count = parseInt(user['msg-param-viewerCount']) || 0;
                
                const ally = ALLIES.find(a => a.id.toLowerCase() === tid);
                const type = ally ? ally.type : 'NONE';
                
                // 抓取被揪團者的頭像
                let tAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(tname)}&background=18181b&color=9146FF`;
                if (API.token) {
                    try {
                        const tRes = await fetch(`https://api.twitch.tv/helix/users?login=${tid}`, { headers: { 'Client-ID': API.client, 'Authorization': `Bearer ${API.token}` } });
                        const tD = await tRes.json();
                        if (tD.data?.[0]) tAvatar = tD.data[0].profile_image_url;
                    } catch(e) {}
                }

                logNewRaid(tname, tid, count, type, tAvatar);
            }
        });
        irc.connect();

        function logNewRaid(name, id, count, type, avatar) {
            const logs = JSON.parse(localStorage.getItem('yushen_v6_logs') || '[]');
            const now = new Date();
            logs.unshift({
                name, id, count, type, avatar,
                time: now.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' }),
                date: now.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' })
            });
            if (logs.length > 50) logs.pop();
            localStorage.setItem('yushen_v6_logs', JSON.stringify(logs));
            renderLogs();
        }

        function renderLogs() {
            const box = document.getElementById('log-list');
            const logs = JSON.parse(localStorage.getItem('yushen_v6_logs') || '[]');
            document.getElementById('r-total').innerText = logs.length;
            
            if (logs.length === 0) {
                box.innerHTML = '<div class="py-32 text-center opacity-20 italic"><i data-lucide="search" class="w-16 h-16 mx-auto mb-4"></i>正在監聽祐玄的揪團動作...</div>';
                lucide.createIcons({ root: box });
                return;
            }

            box.innerHTML = logs.map(r => {
                const cardClass = r.type === 'NONE' ? 'card-none' : `card-${r.type.toLowerCase()}`;
                const badgeClass = r.type === 'NONE' ? 'badge-none' : `badge-${r.type.toLowerCase()}`;
                const badgeLabel = r.type === 'NONE' ? '非盟友' : r.type;
                
                return `
                    <div class="glass-panel rounded-[2rem] p-6 flex items-center justify-between hover:scale-[1.01] transition-all duration-300 ${cardClass}">
                        <div class="flex items-center gap-6">
                            <div class="relative">
                                <img src="${r.avatar}" class="w-16 h-16 rounded-2xl object-cover shadow-xl border border-white/10">
                                <span class="absolute -top-2 -right-2 px-2 py-0.5 rounded-lg text-[8px] font-black uppercase tracking-widest ${badgeClass}">${badgeLabel}</span>
                            </div>
                            <div>
                                <div class="flex items-center gap-3">
                                    <span class="text-2xl font-black text-white italic tracking-tight">${r.name}</span>
                                    <a href="https://twitch.tv/${r.id}" target="_blank" class="text-gray-600 hover:text-twitch-accent transition-colors"><i data-lucide="external-link" class="w-4 h-4"></i></a>
                                </div>
                                <div class="text-[10px] text-gray-500 font-black mt-1 uppercase tracking-[0.2em] flex items-center gap-2">
                                    <i data-lucide="calendar" class="w-3.5 h-3.5"></i> ${r.date} 
                                    <span class="opacity-20">|</span> 
                                    <i data-lucide="clock" class="w-3.5 h-3.5"></i> ${r.time} 
                                    <span class="opacity-20">|</span> 
                                    @${r.id}
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-3xl font-black text-twitch-accent italic tracking-tighter">${r.count.toLocaleString()}</div>
                            <div class="text-[9px] font-black text-gray-600 uppercase tracking-[0.2em]">Viewers Raided</div>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons({ root: box });
        }

        window.clearLogs = function() { if(confirm('確定清除紀錄？')) { localStorage.removeItem('yushen_v6_logs'); renderLogs(); } };

        // --- Start ---
        lucide.createIcons();
        renderLogs();
        syncLiveStatus();
        setInterval(syncLiveStatus, 30000);
    </script>
</body>

</html>
